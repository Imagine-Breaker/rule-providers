payload:
  # 1. 域名后缀匹配 (匹配 example.com 及其所有子域名)
  - DOMAIN-SUFFIX,google.com
  - DOMAIN-SUFFIX,bgm.tv
  - DOMAIN-SUFFIX,ubits.club
  - DOMAIN-SUFFIX,m-team.cc
  - DOMAIN-SUFFIX,ghfast.top
  
  # 2. 完整域名匹配 (仅匹配精确的域名)
  - DOMAIN,pting.club
  
  # 3. 域名关键字匹配 (只要域名中包含该词就匹配，容易误杀，谨慎使用)
  - DOMAIN-KEYWORD,netflix
