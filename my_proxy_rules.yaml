payload:
  # 1. 域名后缀匹配 (匹配 example.com 及其所有子域名)
  - DOMAIN-SUFFIX,google.com
  
  # 2. 完整域名匹配 (仅匹配精确的域名)
  - DOMAIN,pting.club
  
  # 3. 域名关键字匹配 (只要域名中包含该词就匹配，容易误杀，谨慎使用)
  - DOMAIN-KEYWORD,netflix
  
  # 4. IP CIDR 匹配 (匹配整个 IP 段)
  #- IP-CIDR,192.168.0.0/16
  #- IP-CIDR,10.0.0.0/8,no-resolve # no-resolve 表示不触发 DNS 解析
  
  # 5. 目标端口匹配
  #- DST-PORT,22
  #- DST-PORT,3389
